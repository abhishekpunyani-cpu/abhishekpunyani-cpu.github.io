<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhishek Punyani - CS Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5; /* Light gray base background */
            color: #333;
            line-height: 1.6;
            padding: 40px 20px;
        }

        /* Main container jo content ko center mein rakhega */
        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header section styling (Card format) */
        header {
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
            margin-bottom: 30px;
            border-top: 5px solid #007bff; /* Techy blue accent bar */
        }

        h1 {
            font-weight: 700;
            font-size: 2.8rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .bio {
            font-size: 1.1rem;
            color: #7f8c8d;
            font-weight: 400;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Section titles styling */
        h2 {
            font-weight: 600;
            color: #007bff;
            margin-top: 30px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #dbeafe;
        }

        /* Content blocks (Cards for sections) */
        .section-card {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            margin-bottom: 20px;
        }

        /* Skill tags list styling */
        .skills-list {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 10px;
        }

        .skills-list li {
            background-color: #e3f2fd; /* Light blue tech badge */
            color: #0d47a1;
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: transform 0.2s; /* Topper move: Hover effect */
        }

        .skills-list li:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Info text inside cards */
        .card-text {
            color: #5d6d7e;
            font-size: 1rem;
        }

        /* Footer/Contact section */
        footer.contact {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            margin-top: 40px;
        }

        footer.contact h3 {
            font-size: 1.4rem;
            margin-bottom: 10px;
            color: #ecf0f1;
        }

        footer.contact p {
            font-size: 1rem;
        }
        
        .roll-number {
            font-weight: 700;
            color: #ffd700; /* Gold accent for the roll number */
        }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Hi, I'm Abhishek Punyani</h1>
            <p class="bio">I am a computer science student building my expertise in software development.</p>
        </header>

        <section id="expertise" class="section-card">
            <h2>My Expertise</h2>
            <ul class="skills-list">
                <li>C Programming</li>
                <li>Java</li>
                <li>Web Development (HTML/CSS)</li>
            </ul>
        </section>

        <section id="projects" class="section-card">
            <h2>Projects & College Work</h2>
            <p class="card-text">I will be uploading my code and assignments here soon!</p>
        </section>

        <footer class="contact">
            <h3>Contact</h3>
            <p>Roll Number: <span class="roll-number">2K25CSUM01012</span></p>
        </footer>
    </div>
</body>
</html>
